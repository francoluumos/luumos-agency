name: E2E (Playwright)

# Runs the end-to-end suite on every push/PR to main and staging. The uploaded
# HTML report is the record of what was tested, when, and on which browsers.
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  e2e:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
